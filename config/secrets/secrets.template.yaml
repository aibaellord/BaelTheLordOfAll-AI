# BAEL Secrets Configuration
# IMPORTANT: Never commit this file with real values!
# Copy to secrets.yaml and add your actual credentials

# =============================================================================
# LLM PROVIDER API KEYS
# =============================================================================

llm:
  openai:
    api_key: "${OPENAI_API_KEY}"  # or paste your key directly
    organization_id: ""  # Optional

  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"

  groq:
    api_key: "${GROQ_API_KEY}"

  openrouter:
    api_key: "${OPENROUTER_API_KEY}"

  google:
    api_key: "${GOOGLE_API_KEY}"

  cohere:
    api_key: "${COHERE_API_KEY}"

  mistral:
    api_key: "${MISTRAL_API_KEY}"

# =============================================================================
# INTEGRATION CREDENTIALS
# =============================================================================

integrations:
  github:
    token: "${GITHUB_TOKEN}"
    # Generate at: https://github.com/settings/tokens
    # Required scopes: repo, read:user

  slack:
    bot_token: "${SLACK_BOT_TOKEN}"
    # Create app at: https://api.slack.com/apps
    # Required scopes: chat:write, channels:read
    signing_secret: "${SLACK_SIGNING_SECRET}"

  notion:
    api_key: "${NOTION_API_KEY}"
    # Create integration at: https://www.notion.so/my-integrations

  jira:
    api_token: "${JIRA_API_TOKEN}"
    email: ""
    base_url: ""  # e.g., https://yourcompany.atlassian.net

# =============================================================================
# DATABASE CREDENTIALS
# =============================================================================

databases:
  postgres:
    host: "localhost"
    port: 5432
    database: "bael"
    username: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"

  redis:
    host: "localhost"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0

# =============================================================================
# CLOUD PROVIDER CREDENTIALS
# =============================================================================

cloud:
  aws:
    access_key_id: "${AWS_ACCESS_KEY_ID}"
    secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
    region: "us-east-1"

  gcp:
    credentials_file: "${GOOGLE_APPLICATION_CREDENTIALS}"
    project_id: ""

  azure:
    tenant_id: "${AZURE_TENANT_ID}"
    client_id: "${AZURE_CLIENT_ID}"
    client_secret: "${AZURE_CLIENT_SECRET}"

# =============================================================================
# SECURITY KEYS
# =============================================================================

security:
  encryption_key: "${BAEL_ENCRYPTION_KEY}"
  jwt_secret: "${BAEL_JWT_SECRET}"
  api_key: "${BAEL_API_KEY}"  # For authenticating to BAEL's API

# =============================================================================
# WEBHOOK SECRETS
# =============================================================================

webhooks:
  github_secret: "${GITHUB_WEBHOOK_SECRET}"
  slack_secret: "${SLACK_WEBHOOK_SECRET}"
