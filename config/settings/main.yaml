# BAEL Configuration - The Ultimate Agent System
# All settings for maximum power and performance

# =============================================================================
# CORE SETTINGS
# =============================================================================
core:
  name: "BAEL - The Lord of All AI Agents"
  version: "1.0.0"
  mode: "supreme"  # Options: basic, advanced, supreme
  debug: false
  log_level: "INFO"

  # Maximum iterations before stopping
  max_iterations: 1000

  # Timeout settings (in seconds)
  timeouts:
    default: 300
    code_execution: 600
    web_research: 180
    api_calls: 60

  # Auto-continue without asking
  auto_continue: true

  # Self-reflection after each major action
  self_reflection: true

  # Learning from interactions
  learning_enabled: true

  # Creativity mode
  creativity_mode: "maximum"  # Options: constrained, balanced, maximum, boundaryless

# =============================================================================
# AI MODEL CONFIGURATION
# =============================================================================
models:
  # Primary model for complex reasoning
  primary:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    temperature: 0.7
    max_tokens: 16000

  # Fast model for quick tasks
  fast:
    provider: "openrouter"
    model: "anthropic/claude-3-haiku"
    temperature: 0.3
    max_tokens: 4000

  # Code-specialized model
  code:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    temperature: 0.2
    max_tokens: 16000

  # Creative model
  creative:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    temperature: 0.9
    max_tokens: 8000

  # Reasoning model
  reasoning:
    provider: "openrouter"
    model: "anthropic/claude-sonnet-4"
    temperature: 0.5
    max_tokens: 16000

  # Vision model
  vision:
    provider: "openai"
    model: "gpt-4o"
    max_tokens: 4000

  # Embedding model
  embedding:
    provider: "openai"
    model: "text-embedding-3-large"
    dimensions: 3072

  # Auto-selection rules
  auto_select:
    enabled: true
    rules:
      - condition: "task.type == 'code'"
        model: "code"
      - condition: "task.type == 'creative'"
        model: "creative"
      - condition: "task.type == 'research'"
        model: "reasoning"
      - condition: "task.complexity < 3"
        model: "fast"
      - condition: "default"
        model: "primary"

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================
memory:
  enabled: true

  # Vector database settings
  vector_db:
    provider: "chroma"  # Options: chroma, pinecone, weaviate, qdrant
    collection_name: "bael_memory"
    persist_directory: "./memory/vector"

  # Memory types
  types:
    episodic:
      enabled: true
      max_entries: 10000
      retention_days: 365

    semantic:
      enabled: true
      max_entries: 50000
      auto_organize: true

    procedural:
      enabled: true
      max_patterns: 5000
      learning_rate: 0.1

    working:
      enabled: true
      context_window: 100000
      compression_enabled: true

  # Memory retrieval
  retrieval:
    max_results: 50
    relevance_threshold: 0.7
    rerank_enabled: true

  # Auto-save interval (seconds)
  auto_save_interval: 60

  # Memory consolidation (during idle)
  consolidation:
    enabled: true
    idle_threshold: 300

# =============================================================================
# PERSONA CONFIGURATION
# =============================================================================
personas:
  enabled: true

  # Available specialist personas
  specialists:
    - id: "architect_prime"
      name: "Architect Prime"
      expertise: ["system_design", "architecture", "scalability", "patterns"]
      experience_years: 25

    - id: "code_master"
      name: "Code Master"
      expertise: ["clean_code", "algorithms", "optimization", "debugging"]
      experience_years: 20

    - id: "security_sentinel"
      name: "Security Sentinel"
      expertise: ["security", "penetration_testing", "compliance", "crypto"]
      experience_years: 15

    - id: "qa_perfectionist"
      name: "QA Perfectionist"
      expertise: ["testing", "automation", "quality", "coverage"]
      experience_years: 18

    - id: "ux_visionary"
      name: "UX Visionary"
      expertise: ["design", "accessibility", "user_research", "interaction"]
      experience_years: 20

    - id: "devops_commander"
      name: "DevOps Commander"
      expertise: ["infrastructure", "cicd", "kubernetes", "monitoring"]
      experience_years: 15

    - id: "data_sage"
      name: "Data Sage"
      expertise: ["data_engineering", "ml_ops", "analytics", "pipelines"]
      experience_years: 20

    - id: "research_oracle"
      name: "Research Oracle"
      expertise: ["research", "analysis", "synthesis", "discovery"]
      experience_years: 15

    - id: "creative_genius"
      name: "Creative Genius"
      expertise: ["innovation", "ideation", "problem_solving", "creativity"]
      experience_years: 25

    - id: "strategy_master"
      name: "Strategy Master"
      expertise: ["planning", "optimization", "decision_making", "risk"]
      experience_years: 20

    - id: "documentation_expert"
      name: "Documentation Expert"
      expertise: ["technical_writing", "api_docs", "tutorials", "guides"]
      experience_years: 12

    - id: "performance_wizard"
      name: "Performance Wizard"
      expertise: ["optimization", "profiling", "caching", "efficiency"]
      experience_years: 15

  # Auto-activation based on task
  auto_activate: true

  # Multi-persona collaboration
  collaboration:
    enabled: true
    max_personas: 5
    synthesis_enabled: true

# =============================================================================
# TOOL CONFIGURATION
# =============================================================================
tools:
  # Code execution
  code_execution:
    enabled: true
    languages:
      python:
        version: "3.11+"
        packages:
          - requests
          - beautifulsoup4
          - pandas
          - numpy
          - openai
          - anthropic
          - langchain
          - chromadb
          - playwright
          - aiohttp
          - pydantic
          - sqlalchemy
          - redis
          - celery
      javascript:
        runtime: "node 20+"
        packages:
          - axios
          - cheerio
          - puppeteer
          - openai
          - zod
      typescript:
        enabled: true
      bash:
        enabled: true
      sql:
        enabled: true
      rust:
        enabled: true
      go:
        enabled: true
    timeout: 300
    max_output_length: 100000
    sandbox: true

  # Web search
  web_search:
    enabled: true
    providers:
      - name: "brave"
        api_key_env: "BRAVE_API_KEY"
        max_results: 20
      - name: "serper"
        api_key_env: "SERPER_API_KEY"
        max_results: 20
      - name: "tavily"
        api_key_env: "TAVILY_API_KEY"
        max_results: 10
    deep_search: true
    verify_sources: true

  # Browser automation
  browser:
    enabled: true
    provider: "playwright"
    headless: true
    capabilities:
      - navigation
      - form_filling
      - screenshot
      - pdf_generation
      - content_extraction
      - javascript_execution
      - cookie_management
      - session_handling
    timeout: 60
    max_pages: 10

  # File system
  file_system:
    enabled: true
    allowed_paths:
      - "./workspace"
      - "./projects"
      - "./data"
      - "./outputs"
    max_file_size: "100MB"
    operations:
      - read
      - write
      - delete
      - create
      - move
      - copy

  # API integration
  api:
    enabled: true
    timeout: 60
    retry_attempts: 3
    authentication_methods:
      - api_key
      - oauth2
      - jwt
      - basic

  # Database access
  database:
    enabled: true
    providers:
      - postgresql
      - mysql
      - mongodb
      - redis
      - sqlite
    connection_pooling: true
    max_connections: 10

  # GitHub integration
  github:
    enabled: true
    capabilities:
      - search_repos
      - read_files
      - create_repos
      - manage_issues
      - create_prs
      - analyze_code
      - clone_repos

  # Shell execution
  shell:
    enabled: true
    allowed_commands:
      - git
      - npm
      - pip
      - docker
      - kubectl
      - terraform
    timeout: 120

# =============================================================================
# REASONING CONFIGURATION
# =============================================================================
reasoning:
  # Chain of Thought
  chain_of_thought:
    enabled: true
    verbose: true

  # Tree of Thought
  tree_of_thought:
    enabled: true
    max_branches: 5
    depth: 3

  # Graph of Thought
  graph_of_thought:
    enabled: true
    max_nodes: 20

  # Meta-cognition
  meta_cognition:
    enabled: true
    self_reflection: true
    confidence_tracking: true

  # Self-consistency
  self_consistency:
    enabled: true
    num_paths: 3
    threshold: 0.7

  # Multi-hypothesis
  multi_hypothesis:
    enabled: true
    min_hypotheses: 3
    max_hypotheses: 5

# =============================================================================
# RESEARCH CONFIGURATION
# =============================================================================
research:
  # GitHub research
  github:
    enabled: true
    max_repos: 50
    analyze_code: true
    check_activity: true

  # Web research
  web:
    enabled: true
    max_pages: 100
    depth: 3
    verify_sources: true

  # Academic research
  academic:
    enabled: true
    sources:
      - arxiv
      - semantic_scholar
      - google_scholar
    max_papers: 20

  # Social media research
  social:
    enabled: true
    platforms:
      - twitter
      - reddit
      - hackernews
      - producthunt
    max_posts: 50

  # Synthesis
  synthesis:
    enabled: true
    auto_summarize: true
    extract_insights: true
    identify_patterns: true

# =============================================================================
# WORKFLOW CONFIGURATION
# =============================================================================
workflows:
  # Development workflow
  development:
    phases:
      - vision
      - research
      - architecture
      - setup
      - implementation
      - testing
      - optimization
      - deployment
    quality_gates: true
    documentation: true

  # Research workflow
  research:
    multi_channel: true
    verification: true
    synthesis: true

  # Automation workflow
  automation:
    scheduling: true
    triggers: true
    notifications: true

# =============================================================================
# PROTOCOL CONFIGURATION
# =============================================================================
protocols:
  # Development protocol
  development:
    tdd: true
    code_review: true
    documentation: true
    security_check: true

  # Quality protocol
  quality:
    coverage_target: 90
    security_scan: true
    performance_test: true
    accessibility_check: true

  # Security protocol
  security:
    threat_modeling: true
    vulnerability_scan: true
    secret_detection: true
    compliance_check: true

# =============================================================================
# UI CONFIGURATION
# =============================================================================
ui:
  # Web UI
  web:
    enabled: true
    port: 7777
    host: "0.0.0.0"
    theme: "dark"

  # Terminal UI
  terminal:
    enabled: true
    colors: true
    unicode: true

  # API
  api:
    enabled: true
    port: 7778
    cors: true
    rate_limit: 100

# =============================================================================
# INTEGRATION CONFIGURATION
# =============================================================================
integrations:
  # OpenRouter
  openrouter:
    enabled: true
    api_key_env: "OPENROUTER_API_KEY"

  # Anthropic
  anthropic:
    enabled: true
    api_key_env: "ANTHROPIC_API_KEY"

  # OpenAI
  openai:
    enabled: true
    api_key_env: "OPENAI_API_KEY"

  # VS Code
  vscode:
    enabled: true
    extension_path: "~/.vscode/extensions"

  # Cursor
  cursor:
    enabled: true

  # GitHub Copilot
  copilot:
    enabled: true
    integration_mode: "bridge"

# =============================================================================
# MCP SERVERS
# =============================================================================
mcp_servers:
  filesystem:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]

  github:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

  postgres:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-postgres"]

  brave_search:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"

  puppeteer:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-puppeteer"]

  memory:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-memory"]

  fetch:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-fetch"]

  sequential_thinking:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]

# =============================================================================
# ADVANCED SETTINGS
# =============================================================================
advanced:
  # Emotional intelligence
  emotional_intelligence:
    enabled: true
    motivation_boost: true
    quality_triggers: true

  # Zero-invest mindset
  zero_invest_mindset:
    enabled: true
    boundaryless_thinking: true
    constraint_inversion: true
    cross_domain_pollination: true

  # Continuous improvement
  continuous_improvement:
    enabled: true
    learn_from_feedback: true
    pattern_extraction: true
    skill_acquisition: true

  # Quality assurance
  quality_assurance:
    multi_perspective_review: true
    adversarial_testing: true
    edge_case_analysis: true

  # Performance optimization
  performance:
    caching: true
    parallel_execution: true
    lazy_loading: true
    connection_pooling: true
