# =============================================================================
# BAEL MCP Gateway - Route Configuration
# =============================================================================
# Routes requests to appropriate MCP servers
# =============================================================================

server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"mcp-gateway","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Gateway info
    location / {
        return 200 '{
            "name": "BAEL MCP Gateway",
            "version": "1.0.0",
            "status": "running",
            "endpoints": {
                "health": "/health",
                "status": "/mcp/status",
                "servers": "/mcp/servers",
                "tools": "/mcp/tools"
            },
            "mcp_servers": {
                "essential": ["filesystem", "brave-search", "github", "sqlite", "memory"],
                "power": ["playwright", "docker", "git", "postgres", "redis", "slack"],
                "enhanced": ["fetch", "puppeteer", "sequential-thinking", "time", "exa", "firecrawl", "context7", "everything"],
                "specialized": ["youtube", "google-drive", "google-maps", "aws-kb", "s3", "cloudflare", "sentry", "raygun", "linear", "notion", "obsidian", "todoist", "e2b"]
            }
        }';
        add_header Content-Type application/json;
    }

    # MCP Status aggregation
    location /mcp/status {
        proxy_pass http://mcp-health-monitor:8080/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # List all MCP servers
    location /mcp/servers {
        return 200 '[
            {"name": "filesystem", "tier": "essential", "status": "active", "tools": ["read_file", "write_file", "list_directory", "search_files", "get_file_info", "create_directory", "move_file"]},
            {"name": "brave-search", "tier": "essential", "status": "active", "tools": ["brave_web_search", "brave_local_search"]},
            {"name": "github", "tier": "essential", "status": "active", "tools": ["create_repository", "search_repositories", "get_file_contents", "create_or_update_file", "push_files", "create_issue", "create_pull_request", "fork_repository", "create_branch"]},
            {"name": "sqlite", "tier": "essential", "status": "active", "tools": ["read_query", "write_query", "create_table", "list_tables", "describe_table", "append_insight"]},
            {"name": "memory", "tier": "essential", "status": "active", "tools": ["create_entities", "create_relations", "add_observations", "delete_entities", "delete_observations", "delete_relations", "read_graph", "search_nodes", "open_nodes"]},
            {"name": "playwright", "tier": "power", "status": "active", "tools": ["playwright_navigate", "playwright_screenshot", "playwright_click", "playwright_fill", "playwright_select", "playwright_hover", "playwright_evaluate"]},
            {"name": "docker", "tier": "power", "status": "active", "tools": ["list_containers", "create_container", "run_container", "stop_container", "remove_container", "get_logs", "list_images"]},
            {"name": "git", "tier": "power", "status": "active", "tools": ["git_status", "git_diff", "git_commit", "git_add", "git_reset", "git_log", "git_create_branch", "git_checkout", "git_show"]},
            {"name": "postgres", "tier": "power", "status": "active", "tools": ["query", "execute", "list_tables", "describe_table"]},
            {"name": "redis", "tier": "power", "status": "active", "tools": ["get", "set", "delete", "list_keys", "publish", "subscribe"]},
            {"name": "slack", "tier": "power", "status": "active", "tools": ["list_channels", "post_message", "reply_to_thread", "add_reaction", "get_channel_history", "get_thread_replies", "search_messages", "get_users", "get_user_profile"]},
            {"name": "fetch", "tier": "enhanced", "status": "active", "tools": ["fetch"]},
            {"name": "puppeteer", "tier": "enhanced", "status": "active", "tools": ["puppeteer_navigate", "puppeteer_screenshot", "puppeteer_click", "puppeteer_fill", "puppeteer_select", "puppeteer_hover", "puppeteer_evaluate"]},
            {"name": "sequential-thinking", "tier": "enhanced", "status": "active", "tools": ["sequentialthinking"]},
            {"name": "time", "tier": "enhanced", "status": "active", "tools": ["get_current_time", "convert_time"]},
            {"name": "exa", "tier": "enhanced", "status": "active", "tools": ["search", "find_similar", "get_contents"]},
            {"name": "firecrawl", "tier": "enhanced", "status": "active", "tools": ["firecrawl_scrape", "firecrawl_map", "firecrawl_crawl", "firecrawl_check_crawl_status"]},
            {"name": "context7", "tier": "enhanced", "status": "active", "tools": ["resolve-library-id", "get-library-docs"]},
            {"name": "everything", "tier": "enhanced", "status": "active", "tools": ["search"]},
            {"name": "youtube", "tier": "specialized", "status": "active", "tools": ["get_transcript"]},
            {"name": "google-drive", "tier": "specialized", "status": "active", "tools": ["search", "read_file", "list_folder"]},
            {"name": "google-maps", "tier": "specialized", "status": "active", "tools": ["maps_geocode", "maps_reverse_geocode", "maps_search_places", "maps_place_details", "maps_distance_matrix", "maps_directions", "maps_elevation"]},
            {"name": "aws-kb", "tier": "specialized", "status": "active", "tools": ["retrieve_from_knowledge_base"]},
            {"name": "s3", "tier": "specialized", "status": "active", "tools": ["list_buckets", "list_objects", "get_object", "put_object", "delete_object"]},
            {"name": "cloudflare", "tier": "specialized", "status": "active", "tools": ["kv_get", "kv_put", "kv_list", "kv_delete", "r2_get", "r2_put", "r2_list", "r2_delete", "d1_query", "workers_list", "workers_deploy"]},
            {"name": "sentry", "tier": "specialized", "status": "active", "tools": ["list_issues", "get_issue", "resolve_issue", "list_projects", "get_event"]},
            {"name": "raygun", "tier": "specialized", "status": "active", "tools": ["list_errors", "get_error", "resolve_error"]},
            {"name": "linear", "tier": "specialized", "status": "active", "tools": ["list_issues", "create_issue", "update_issue", "search_issues", "list_projects", "list_teams"]},
            {"name": "notion", "tier": "specialized", "status": "active", "tools": ["search", "get_page", "create_page", "update_page", "list_databases", "query_database"]},
            {"name": "obsidian", "tier": "specialized", "status": "active", "tools": ["list_notes", "read_note", "create_note", "update_note", "search_notes", "get_tags"]},
            {"name": "todoist", "tier": "specialized", "status": "active", "tools": ["list_tasks", "create_task", "update_task", "complete_task", "list_projects", "create_project"]},
            {"name": "e2b", "tier": "specialized", "status": "active", "tools": ["create_sandbox", "run_code", "run_terminal_command", "read_file", "write_file", "list_files"]}
        ]';
        add_header Content-Type application/json;
    }

    # List all available tools
    location /mcp/tools {
        return 200 '{
            "total_tools": 147,
            "by_category": {
                "filesystem": 7,
                "search": 8,
                "code": 15,
                "database": 12,
                "browser": 14,
                "communication": 15,
                "cloud": 22,
                "productivity": 18,
                "monitoring": 8,
                "ai": 4,
                "other": 24
            }
        }';
        add_header Content-Type application/json;
    }

    # ==========================================================================
    # MCP Server Proxies - Essential Tier
    # ==========================================================================

    location /mcp/filesystem/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://mcp-filesystem:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-MCP-Server filesystem;
    }

    location /mcp/brave-search/ {
        limit_req zone=mcp_limit burst=10 nodelay;
        proxy_pass http://mcp-brave-search:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-MCP-Server brave-search;
    }

    location /mcp/github/ {
        limit_req zone=mcp_limit burst=30 nodelay;
        proxy_pass http://mcp-github:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-MCP-Server github;
    }

    location /mcp/sqlite/ {
        limit_req zone=mcp_limit burst=50 nodelay;
        proxy_pass http://mcp-sqlite:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-MCP-Server sqlite;
    }

    location /mcp/memory/ {
        limit_req zone=mcp_limit burst=50 nodelay;
        proxy_pass http://mcp-memory:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-MCP-Server memory;
    }

    # ==========================================================================
    # MCP Server Proxies - Power Tier
    # ==========================================================================

    location /mcp/playwright/ {
        limit_req zone=mcp_limit burst=10 nodelay;
        proxy_pass http://mcp-playwright:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_set_header X-MCP-Server playwright;
    }

    location /mcp/docker/ {
        limit_req zone=mcp_limit burst=20 nodelay;
        proxy_pass http://mcp-docker:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-MCP-Server docker;
    }

    location /mcp/git/ {
        limit_req zone=mcp_limit burst=30 nodelay;
        proxy_pass http://mcp-git:3000/;
        proxy_http_version 1.1;
