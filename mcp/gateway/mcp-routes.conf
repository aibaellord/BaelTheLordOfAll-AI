    location /mcp/everything/ {
        limit_req zone=mcp_limit burst=30 nodelay;
        proxy_pass http://mcp-everything:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-MCP-Server everything;
    }

    # ==========================================================================
