        proxy_pass http://mcp-fetch:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        proxy_set_header X-MCP-Server fetch;
    }

    location /mcp/puppeteer/ {
        limit_req zone=mcp_limit burst=10 nodelay;
