# =============================================================================
# BAEL MCP Gateway - Nginx Configuration
# =============================================================================
# Main nginx configuration for MCP Hub routing
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging format for MCP requests
    log_format mcp_format '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'upstream: $upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log mcp_format;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css application/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=100r/s;

    # Upstream health checks
    upstream mcp_filesystem {
        server mcp-filesystem:3000;
        keepalive 32;
    }

    upstream mcp_memory {
        server mcp-memory:3000;
        keepalive 32;
    }

    # Include MCP routes
    include /etc/nginx/conf.d/*.conf;
}
