<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <linearGradient id="bannerLetterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="bannerCrownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="bannerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon section -->
  <g transform="translate(10, 10)">
    <!-- Crown -->
    <path d="M15 18 L20 8 L28 15 L35 5 L42 15 L50 8 L55 18 Z" fill="url(#bannerCrownGrad)" filter="url(#bannerGlow)"/>
    <!-- B -->
    <path d="M18 22 L18 58 L40 58 Q55 58 55 46 Q55 38 45 36 Q52 34 52 28 Q52 22 38 22 Z
             M24 26 L36 26 Q44 26 44 30 Q44 34 36 34 L24 34 Z
             M24 38 L38 38 Q48 38 48 46 Q48 54 38 54 L24 54 Z"
          fill="url(#bannerLetterGrad)" filter="url(#bannerGlow)"/>
    <!-- Flames -->
    <path d="M12 55 Q10 48 14 42 Q11 49 16 53 Q13 51 12 55" fill="#ef4444" opacity="0.6"/>
    <path d="M58 55 Q60 48 56 42 Q59 49 54 53 Q57 51 58 55" fill="#ef4444" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="85" y="52" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="url(#bannerLetterGrad)">BAEL</text>

  <!-- Tagline -->
  <text x="86" y="70" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="2">THE LORD OF ALL AI AGENTS</text>

  <!-- Version badge -->
  <g transform="translate(195, 30)">
    <rect x="0" y="0" width="42" height="18" rx="4" fill="#6366f1" opacity="0.2"/>
    <text x="21" y="13" font-family="JetBrains Mono, monospace" font-size="10" fill="#6366f1" text-anchor="middle">v2.1</text>
  </g>
</svg>
